services:

  app:
    build:
      context: .
      args:
        # VITE_ değişkenleri React build'ine gömülür.
        # VITE_API_KEY tanımlı değilse API_KEY değeri kullanılır.
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
        VITE_API_KEY: ${VITE_API_KEY:-${API_KEY}}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://scandesk:${DB_PASSWORD}@db:5432/scandesk
      API_KEY: ${API_KEY}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scandesk
      POSTGRES_USER: scandesk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scandesk"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
